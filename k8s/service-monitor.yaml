apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: monitoring-demo
  namespace: monitoring
  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: monitoring-demo

  namespaceSelector:
    matchNames:
      - monitoring

  endpoints:
    - port: http
      path: /metrics
      interval: 15s